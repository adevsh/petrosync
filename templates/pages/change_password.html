{{ define "page" }}{{ template "base" . }}{{ end }}

{{ define "title" }}Change Password | PetroSync{{ end }}

{{ define "content" }}
<div class="mx-auto max-w-xl rounded-2xl bg-white p-8 shadow-sm ring-1 ring-slate-200">
  <div class="mb-6">
    <p class="text-sm font-medium uppercase tracking-[0.2em] text-slate-500">Security</p>
    <h2 class="mt-2 text-2xl font-semibold text-slate-950">{{ .Heading }}</h2>
    <p class="mt-2 text-sm text-slate-600">{{ .Description }}</p>
  </div>

  <form action="/change-password" method="post" class="space-y-4">
    <div>
      <label for="current_password" class="mb-2 block text-sm font-medium text-slate-700">Current Password</label>
      <input id="current_password" name="current_password" type="password" autocomplete="current-password" class="block w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-slate-500" required>
    </div>
    <div>
      <label for="new_password" class="mb-2 block text-sm font-medium text-slate-700">New Password</label>
      <input id="new_password" name="new_password" type="password" autocomplete="new-password" minlength="8" class="block w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-slate-500" required>
      <p class="mt-2 text-xs text-slate-500">Use at least 8 characters.</p>
    </div>
    <button type="submit" class="rounded-lg bg-slate-950 px-4 py-2 text-sm font-medium text-white">Update Password</button>
  </form>
</div>
{{ end }}
