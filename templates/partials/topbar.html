{{ define "topbar" }}
<header class="border-b border-slate-200 bg-white">
  <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
    <div>
      <h1 class="text-xl font-semibold text-slate-950">{{ .Title }}</h1>
      {{ if .Breadcrumbs }}
        <nav class="mt-1 flex items-center gap-2 text-sm text-slate-500">
          {{ range $index, $crumb := .Breadcrumbs }}
            {{ if $index }}<span>/</span>{{ end }}
            <a href="{{ $crumb.URL }}" class="hover:text-slate-700">{{ $crumb.Label }}</a>
          {{ end }}
        </nav>
      {{ end }}
    </div>
    <div class="text-right">
      {{ if .Session }}
        <p class="text-sm font-medium text-slate-900">{{ .Session.FullName }}</p>
      {{ end }}
      <p class="text-xs uppercase tracking-[0.2em] text-slate-500">Authenticated Session</p>
    </div>
  </div>
</header>
{{ end }}
